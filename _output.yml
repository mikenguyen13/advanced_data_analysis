# bookdown::gitbook output deliberately disabled --- the published site uses bs4_book.
# Re-enable only if you want a gitbook build alongside bs4. Don't put it first; the first
# format listed becomes the default when render_book() is called without output_format=.
#
# bookdown::gitbook:
#   css: style.css
#   split_by: section
#   config:
#     toc:
#       collapse: section
#       scroll_highlight: true
#       sharing:
#         facebook: true
#         github: true
#         twitter: true
#         linkedin: true
#       info: true
#       edit: https://github.com/mikenguyen13/advanced_data_analysis/edit/main/%s
#       before: |
#         <li><a href="./">Advanced Data Analysis</a></li>
#       after: |
#         <li><a href="https://github.com/rstudio/bookdown" target="blank">Published with bookdown</a></li>
#     download: ["pdf", "epub"]
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: yes
bookdown::epub_book:
  stylesheet: css/epub_style.css
bookdown::bs4_book:
  repo:
    base: https://github.com/mikenguyen13/advanced_data_analysis
    branch: main
  includes:
    in_header: [google_analytics.html, _ai_metadata.html]
  css: style.css
  resource_files:
    - llms.txt
    - robots.txt
