bibliography:
  - book.bib
  - packages.bib
  - references.bib

execute:
  freeze: auto
  warning: false
  message: false
  echo: true

knitr:
  opts_chunk:
    comment: "#>"
    collapse: true
    dpi: 300
    fig-align: center
    out-width: "90%"

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    code-link: true
    code-fold: show
    code-summary: "Show/hide code"
    code-tools: true
    css: style.css
    include-in-header:
      - google_analytics.html
      - _ai_metadata.html
